# Guardrails for scrape ordering:
# 1) Always scrape events before fights (fights uses --events-source db).
# 2) Always scrape fights before --refresh-stats (refresh is update-only).
# 3) Run profile pipelines end-to-end; avoid running refresh-only services standalone.
# 4) Sunday ML + publish order MUST be strictly sequential (DuckDB-safe, no concurrent writers):
#    mma_manual_title_vacates_load
#      -> mma_manual_title_vacates_upload
#      -> ws_ufc_events_recent ... mma_silver_schema
#      -> mma_gold_fighter_status   (canonical active/inactive; overrides JSON
#                                    cascades into silver.fighters here)
#      -> mma_gold_features
#      -> mma_gold_ranking
#      -> mma_gold_belt_holders
#      -> mma_manual_fighter_countries_sync
#      -> mma_gold_catboost_train_sunday_initial
#      -> mma_gold_catboost_tune_sunday
#      -> mma_gold_catboost_train_tuned
#      -> mma_parquets_dashboard
#      -> mma_buttondown_weekly_email
#      -> duckdb_disaster_clone_weekly (last)
# 5) Enforce order with depends_on: condition: service_completed_successfully and restart: "no"
#    so each next step starts only after previous exits successfully.
# Host DB mount source is DUCK_HOST_DB_DIR (default: /home/ares/db/duck/warehouse).
# Recommended shell setup: export DUCK_HOST_DB_DIR="$(dirname "$DUCK_WH_DB")"
# Preferred centralized env source: /home/ares/.config/ml_kuda_sports_lab/pipeline.env (use with: docker compose --env-file ...)

services:
  mma_manual_title_vacates_load:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-gold-etl:latest
    entrypoint: []
    profiles: ["sunday"]
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
      - ${ML_REPO_ROOT:-/home/ares/Documents/gitrepos/ml_kuda_sports_lab}:/workspace:ro
    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_gold_manual_title_vacates
      --target prod
      --rebuild
      --csv-path /workspace/datasets/manual_overrides/ufc_title_vacates.csv
    restart: "no"

  mma_manual_title_vacates_upload:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-gold-etl:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      mma_manual_title_vacates_load:
        condition: service_completed_successfully
    environment:
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT}
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-fightprophet-dashboard}
    volumes:
      - ${ML_REPO_ROOT:-/home/ares/Documents/gitrepos/ml_kuda_sports_lab}:/workspace:ro
    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_upload_manual_title_vacates
      --csv-path /workspace/datasets/manual_overrides/ufc_title_vacates.csv
    restart: "no"

  ws_ufc_events_recent:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-bronze-webscraping:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      mma_manual_title_vacates_upload:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
    command: >
      python3 -m ml_kuda_sports_lab.webscraping.mmascrapers.ws_ufc_events_all
      --target prod
      --events past
    restart: "no"

  ws_ufc_events_upcoming:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-bronze-webscraping:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      ws_ufc_events_recent:
        condition: service_completed_successfully
    environment:
