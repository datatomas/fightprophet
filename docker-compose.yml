    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      ws_ufc_events_based_fighters_upcoming:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
    command: >
      python3 -m ml_kuda_sports_lab.webscraping.mmascrapers.ws_ufc_events_based_fights
      --target prod
      --mode recent
      --fights completed
      --events-source db
    restart: "no"

  ws_ufc_events_based_fights_upcoming:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-bronze-webscraping:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      ws_ufc_events_based_fights_recent:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
    command: >
      python3 -m ml_kuda_sports_lab.webscraping.mmascrapers.ws_ufc_events_based_fights
      --target prod
      --mode full
      --status upcoming
      --events-source db
    restart: "no"

  ws_ufc_events_based_fights_refresh_stats_recent:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-bronze-webscraping:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      ws_ufc_events_based_fights_upcoming:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
    command: >
      python3 -m ml_kuda_sports_lab.webscraping.mmascrapers.ws_ufc_events_based_fights
      --target prod
      --refresh-stats
      --status completed
      --mode recent
      --events-source db
