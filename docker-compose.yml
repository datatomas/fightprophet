      - ${ML_REPO_ROOT:-/home/ares/Documents/gitrepos/ml_kuda_sports_lab}:/workspace:ro
    # Reuses the same JSON the upstream mma_gold_fighter_status step read, but
    # also rebuilds gold.fighter_effective_status itself as a safety net so
    # ranking and silver-cascade can never disagree.
    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_gold_ranking
      --target prod
      --status-overrides-json /workspace/datasets/manual_overrides/fighter_status_overrides.json
    restart: "no"

  mma_gold_belt_holders:
