  mma_silver_schema:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-silver-etl:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      ws_ufc_events_based_fights_refresh_stats_recent:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
