      --target prod
      --rebuild
    restart: "no"

  ws_ufc_events_based_fights_full:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-bronze-webscraping:latest
    entrypoint: []
    profiles: ["monthly"]
