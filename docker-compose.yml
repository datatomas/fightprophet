    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_gold_catboost
      --target prod
      --model all
      --rebuild
      --overwrite-trainall
      --min-event-date 1995-01-01
      --min-feature-coverage 0.0
      --odds-source bestfightodds
      --odds-format american
      --sportsbook Pinnacle
      --sportsbook Stake
      --sportsbook DraftKings
      --sportsbook FanDuel
      --sportsbook BetMGM
      --odds-fallback fightodds
      --market-blend-weight 0.70
      --strong-min-edge 0.08
      --strong-min-agreement 0.80
      --medium-min-edge 0.04
      --medium-min-agreement 0.65
