      --sportsbook Pinnacle
      --sportsbook Stake
      --sportsbook DraftKings
      --sportsbook FanDuel
      --sportsbook BetMGM
      --odds-fallback fightodds
      --market-blend-weight 0.70
      --strong-min-edge 0.08
      --strong-min-agreement 0.80
      --medium-min-edge 0.04
      --medium-min-agreement 0.65
    restart: "no"

  mma_parquets_dashboard:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-gold-etl:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      mma_gold_catboost_train_tuned:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
      - PYTHONPATH=/workspace/src
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT}
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-fightprophet-dashboard}
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
      - ${ML_REPO_ROOT:-/home/ares/Documents/gitreposR/ml_kuda_sports_lab}:/workspace:ro
    # Refreshes gold.fighter_effective_status from the override JSON at startup
    # before exporting parquets, so editing the JSON and re-running ONLY this
    # step is enough to propagate active/inactive changes to athletes/fight
    # cards/rankings parquets.
    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_parquets_dashboard
      --target prod
      --dataset all
      --prefix mma/diamond
      --parquet-base az://fightprophet-dashboard
      --status-overrides-json /workspace/datasets/manual_overrides/fighter_status_overrides.json
    restart: "no"

