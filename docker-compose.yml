    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
    command: >
      python3 -m ml_kuda_sports_lab.webscraping.mmascrapers.ws_ufc_events_based_fighters
