  mma_gold_fighter_status:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-gold-etl:latest
    entrypoint: []
    profiles: ["sunday"]
    depends_on:
      mma_silver_schema:
        condition: service_completed_successfully
    environment:
      - DUCK_WH_DB=/data/db/sports_ml_warehouse.duckdb
    volumes:
      - ${DUCK_HOST_DB_DIR:-/home/ares/db/duck/warehouse}:/data/db
      - ${ML_REPO_ROOT:-/home/ares/Documents/gitrepos/ml_kuda_sports_lab}:/workspace:ro
    # Canonical active/inactive resolver. Reads
    #   datasets/manual_overrides/fighter_status_overrides.json
    # plus silver.fighters/silver.fights, writes gold.fighter_effective_status,
    # and cascades the resolved status into silver.fighters.fighter_status so
    # everything downstream (features, ranking, athletes/profiles, fight cards,
    # rankings parquet, astro homepage feed) sees the same value.
    command: >
      python3 -m ml_kuda_sports_lab.etl.gold.mma_gold_fighter_status
      --target prod
      --status-overrides-json /workspace/datasets/manual_overrides/fighter_status_overrides.json
    restart: "no"

  mma_gold_features:
    image: ghcr.io/${GHCR_OWNER:-datatomas}/ml_kuda_sports_lab-gold-etl:latest
